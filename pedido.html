<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Pedido - TechCart</title> 
    <link rel="stylesheet" href="style.css"> 
</head> 
<body> 
    <header><h1>Finalizar Compra</h1></header> 
    <nav> 
        <a href="index.html">Inicio</a> 
        <a href="productos.html">Productos</a> 
        <a href="pedido.html">Hacer Pedido</a> 
        <a href="nosotros.html">Nosotros</a> 
    </nav> 
    <main> 
        <h2>Formulario de Envío</h2> 
        <form id="form-pedido action="#"> 
            <label for="nombre">Nombre Completo:</label> 
            <input type="text" id="nombre" name="nombre" required> 
 
            <label for="email">Correo Electrónico:</label> 
            <input type="email" id="email" name="email" required> 
 
            <label for="producto">Producto deseado:</label> 
            <select id="producto" name="producto"> 
                <option value="teclado">Teclado Mecánico</option> 
                <option value="raton">Ratón Gaming</option> 
                <option value="monitor">Monitor 4K</option> 
            </select> 
 
            <label for="mensaje">Comentarios adicionales:</label> 
            <textarea id="mensaje" rows="4"></textarea> 
 
            <button type="submit">Enviar Pedido</button> 
        </form> 
    </main> 
    <script src="main.js"></script>
</body> 
</html>
